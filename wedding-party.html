<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Party - Ira & Angel</title>
    <!-- Beautiful Wedding Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Montserrat:wght@200;300;400;500;600&family=Great+Vibes&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Preload critical scripts -->
    <link rel="preload" href="https://unpkg.com/react@18/umd/react.production.min.js" as="script" crossorigin>
    <link rel="preload" href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <!-- Prefetch main page for RSVP navigation -->
    <link rel="prefetch" href="main.html">
    <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script defer src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <!-- Loading indicator -->
    <style>
        /* Prevent scroll issues - CRITICAL FIX */
        html {
            overflow-x: hidden;
            overflow-y: auto;
            height: 100%;
        }
        
        body {
            overflow-x: hidden;
            overflow-y: auto;
            height: 100%;
            min-height: 100vh;
        }
        
        #root {
            min-height: 100vh;
            overflow: visible;
        }
        
        #loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #f8faf8 0%, #f3f6f3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e8ede8;
            border-top-color: #395711;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Fix cursor trail to not interfere with scrolling */
        .cursor-trail {
            pointer-events: none !important;
            position: fixed !important;
        }
        
        /* Ensure floating hearts don't interfere */
        .floating-hearts-container {
            pointer-events: none !important;
            position: fixed !important;
        }
        
        /* Ensure wedding container doesn't create inner scroll */
        .wedding-container {
            overflow: visible !important;
            min-height: 100vh;
            height: auto !important;
            position: relative;
        }
        
        /* Ensure party section doesn't create scroll */
        .party-section {
            overflow: visible !important;
            height: auto !important;
        }
        
        /* Ensure party container doesn't create scroll */
        .party-container {
            overflow: visible !important;
            height: auto !important;
        }
        
        /* Remove extra space after footer */
        .footer {
            margin-bottom: 0 !important;
            padding-bottom: 40px !important;
        }
        
        /* Ensure no extra space at bottom of page */
        body {
            padding-bottom: 0 !important;
            margin-bottom: 0 !important;
        }
        
        .wedding-container {
            padding-bottom: 0 !important;
            margin-bottom: 0 !important;
        }
    </style>
    <div id="loading-screen">
        <div class="loading-spinner"></div>
    </div>
    
    <!-- Bottom-right RSVP link -->
    <div id="fallback-rsvp" style="position: fixed; bottom: 20px; right: 20px; background: linear-gradient(to right, #4a6e15, #395711); color: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 12px rgba(57, 87, 17, 0.3); z-index: 1000; display: none; pointer-events: auto;">
        <a href="main.html#rsvp" onclick="goToRSVP(); return false;" style="color: white; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; pointer-events: auto;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            RSVP Now
        </a>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // SVG Icons as React components
        const Heart = ({ className, fill, ...props }) => (
            <svg className={className} fill={fill || "none"} stroke="currentColor" viewBox="0 0 24 24" {...props}>
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.682l-1.318-1.364a4.5 4.5 0 00-6.364 0z" />
            </svg>
        );

        const DaisyFlower = ({ className, ...props }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" {...props}>
                {/* Petals - Soft Pink */}
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(0 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(30 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(60 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(90 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(120 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(150 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(180 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(210 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(240 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(270 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(300 12 12)"/>
                <ellipse cx="12" cy="6" rx="1.5" ry="4" fill="#f5b5c3" transform="rotate(330 12 12)"/>
                
                {/* Center - Yellow */}
                <circle cx="12" cy="12" r="2.5" fill="#fbbf24"/>
                
                {/* Stem - Sage Green */}
                <rect x="11.5" y="14.5" width="1" height="7" fill="#395711" rx="0.5"/>
                
                {/* Leaf - Sage Green */}
                <ellipse cx="9" cy="18" rx="2" ry="1" fill="#395711" transform="rotate(-30 9 18)"/>
            </svg>
        );

        const Users = ({ className, ...props }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );

        const ArrowLeft = ({ className, ...props }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 12H5m7-7l-7 7 7 7" />
            </svg>
        );

        const WeddingPartyPage = () => {
            // Removed mouse tracking to fix scroll issues
            // const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            useEffect(() => {
                // Removed mouse move handler to fix scroll issues
                // let rafId = null;
                // let currentMousePos = { x: 0, y: 0 };
                
                // const handleMouseMove = (e) => {
                //     currentMousePos = { x: e.clientX, y: e.clientY };
                //     
                //     // Throttle updates using requestAnimationFrame
                //     if (!rafId) {
                //         rafId = requestAnimationFrame(() => {
                //             setMousePos(currentMousePos);
                //             rafId = null;
                //         });
                //     }
                // };

                // window.addEventListener('mousemove', handleMouseMove, { passive: true });

                // Add fade-in animation to sections
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add('section-visible');
                            }
                        });
                    },
                    { threshold: 0.2, rootMargin: '0px' }
                );

                // Wait for DOM to be ready
                setTimeout(() => {
                    document.querySelectorAll('section[id]').forEach((section) => {
                        observer.observe(section);
                    });
                }, 100);

                return () => {
                    // window.removeEventListener('mousemove', handleMouseMove);
                    // if (rafId) {
                    //     cancelAnimationFrame(rafId);
                    // }
                    observer.disconnect();
                };
            }, []);

            return React.createElement('div', { className: 'wedding-container' }, [
                // Floating Hearts Animation - DISABLED FOR TESTING
                // React.createElement('div', { 
                //     key: 'floating-hearts',
                //     className: 'floating-hearts-container' 
                // }, 
                //     [...Array(6)].map((_, i) =>
                //         React.createElement('div', {
                //             key: i,
                //             className: 'floating-heart',
                //             style: {
                //                 left: `${15 + i * 15}%`,
                //                 animationDelay: `${i * 2}s`,
                //                 animationDuration: `${15 + i * 2}s`
                //             }
                //         }, React.createElement(Heart, { className: 'heart-icon-float' }))
                //     )
                // ),

                // Cursor Trail Effect - DISABLED FOR TESTING
                // React.createElement('div', {
                //     key: 'cursor-trail',
                //     className: 'cursor-trail',
                //     style: {
                //         left: mousePos.x - 16,
                //         top: mousePos.y - 16
                //     }
                // }, React.createElement('div', { className: 'cursor-trail-inner' })),

                // Navigation
                React.createElement('nav', { key: 'nav', className: 'navigation' },
                    React.createElement('div', { className: 'nav-container' }, [
                        React.createElement('div', { key: 'nav-content', className: 'nav-content' }, [
                            React.createElement('a', { 
                                key: 'nav-logo', 
                                href: 'index.html',
                                className: 'nav-logo'
                            }, [
                                React.createElement('img', { key: 'nav-logo-img', src: 'image/logo.png', alt: 'Ira & Angel', className: 'nav-heart' })
                            ]),
                            React.createElement('div', { key: 'nav-center', className: 'nav-center', style: { marginLeft: '120px' } }, [
                                React.createElement('h1', { className: 'story-page-title', style: { fontFamily: "'Great Vibes', cursive", fontSize: '24px', color: '#2d3748', fontWeight: '400' } }, 'Wedding Party')
                            ]),
                            React.createElement('a', {
                                key: 'back-button',
                                href: 'main.html',
                                className: 'back-button',
                                style: { display: 'flex', alignItems: 'center', gap: '6px', color: '#4a5568', textDecoration: 'none', fontFamily: "'Montserrat', sans-serif", fontSize: '12px', fontWeight: '500', transition: 'color 0.3s ease' }
                            }, [
                                React.createElement(ArrowLeft, { key: 'arrow', className: 'back-arrow', style: { width: '16px', height: '16px' } }),
                                'Back to Wedding'
                            ])
                        ])
                    ])
                ),

                // Wedding Party Section
                React.createElement('section', { key: 'wedding-party', id: 'wedding-party', className: 'party-section party-page', style: { paddingTop: '100px', paddingBottom: '40px' } },
                    React.createElement('div', { className: 'party-container' }, [
                        React.createElement('div', { key: 'party-header', className: 'section-header', style: { marginBottom: '16px', textAlign: 'center' } }, [
                            React.createElement('p', { className: 'section-subtitle', style: { fontSize: '18px', lineHeight: '1.4', color: '#718096', fontStyle: 'italic', fontFamily: "'Cormorant Garamond', serif" } }, 'Meet the special people who will be standing with us on our big day')
                        ]),
                        React.createElement('div', { key: 'party-grid', className: 'party-grid' }, [
                            // Bridesmaids
                            React.createElement('div', { key: 'bridesmaids', className: 'party-group' }, [
                                React.createElement('h2', { key: 'bridesmaids-title', className: 'party-group-title rose' }, 'Bridesmaids'),
                                React.createElement('div', { key: 'bridesmaids-list', className: 'party-members' },
                                    [
                                        { name: 'Sharmaine L. Balino', role: 'Maid of Honor', relation: 'Sister' },
                                        { name: 'Julie Ann B. Mediana', role: 'Bridesmaid', relation: 'Soul Sister' },
                                        { name: 'Pauline Jean L. Llaneta', role: 'Bridesmaid', relation: 'Sister in Law' },
                                        { name: 'Diana Jane L. Naag', role: 'Bridesmaid', relation: 'High school bestie' },
                                        { name: 'Maryka Dianne D. Exconde', role: 'Bridesmaid', relation: 'Sister in law' },
                                        { name: 'Danny Marie C. Vallejo', role: 'Bridesmaid', relation: 'Bestie from Ira\'s best man' },
                                        { name: 'Sabrina Fatima T. Alarma', role: 'Cord', relation: 'Work bestie' }
                                    ].map((person, i) =>
                                        React.createElement('div', { key: i, className: 'party-member', style: { animationDelay: `${i * 0.15}s` } }, [
                                            React.createElement('div', { key: 'avatar', className: 'party-avatar rose' },
                                                React.createElement(Users, { className: 'party-avatar-icon' })
                                            ),
                                            React.createElement('h3', { key: 'name', className: 'party-member-name' }, person.name),
                                            React.createElement('p', { key: 'role', className: 'party-member-role rose' }, person.role),
                                            React.createElement('p', { key: 'relation', className: 'party-member-relation' }, person.relation)
                                        ])
                                    )
                                )
                            ]),
                            // Groomsmen
                            React.createElement('div', { key: 'groomsmen', className: 'party-group' }, [
                                React.createElement('h2', { key: 'groomsmen-title', className: 'party-group-title green' }, 'Groomsmen'),
                                React.createElement('div', { key: 'groomsmen-list', className: 'party-members' },
                                    [
                                        { name: 'Armand D. Vallejo', role: 'Best Man', relation: 'Childhood friend' },
                                        { name: 'Jayson O. Avestrus', role: 'Groomsman', relation: 'College friend' },
                                        { name: 'Jurineil L. Llaneta', role: 'Groomsman', relation: 'Brother in law' },
                                        { name: 'Edgarico L. Llaneta', role: 'Groomsman', relation: 'Brother in law' },
                                        { name: 'Jon Jayvee G. Llaneta', role: 'Groomsman', relation: 'Cousin in law' },
                                        { name: 'Deane Martin C. Brion', role: 'Groomsman', relation: 'High school friend' },
                                        { name: 'Michael Benjamin M. Diaz', role: 'Groomsman', relation: 'High school friend' }
                                    ].map((person, i) =>
                                        React.createElement('div', { key: i, className: 'party-member', style: { animationDelay: `${i * 0.15}s` } }, [
                                            React.createElement('div', { key: 'avatar', className: 'party-avatar green' },
                                                React.createElement(Users, { className: 'party-avatar-icon' })
                                            ),
                                            React.createElement('h3', { key: 'name', className: 'party-member-name' }, person.name),
                                            React.createElement('p', { key: 'role', className: 'party-member-role green' }, person.role),
                                            React.createElement('p', { key: 'relation', className: 'party-member-relation' }, person.relation)
                                        ])
                                    )
                                )
                            ])
                        ])
                    ])
                ),

                // Footer
                React.createElement('footer', { key: 'footer', className: 'footer' },
                    React.createElement('div', { className: 'footer-container' }, [
                        React.createElement('p', { key: 'footer-copyright', className: 'footer-copyright' }, 
                            '© 2026 Ira & Angel Anonuevo. All rights reserved.'
                        )
                    ])
                )
            ]);
        };

        ReactDOM.render(React.createElement(WeddingPartyPage), document.getElementById('root'));
        
        // Hide loading screen after render
        requestAnimationFrame(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.classList.add('hidden');
                setTimeout(() => loadingScreen.remove(), 300);
            }
        });
        
        // Show RSVP button immediately
        const fallback = document.getElementById('fallback-rsvp');
        if (fallback) {
            fallback.style.display = 'block';
        }
        
        // Add a simple function to navigate to RSVP
        window.goToRSVP = function() {
            try {
                sessionStorage.setItem('scrollToRSVP', 'true');
                window.location.href = 'main.html';
            } catch (e) {
                // Fallback to direct hash navigation
                window.location.href = 'main.html#rsvp';
            }
        };
    </script>
</body>
</html>
